# Label taxonomy for maintainers.
# Keep labels focused on type, area, priority, level, quality, size, and workflow state.

types:
  - "type:bug"
  - "type:feature"
  - "type:docs"
  - "type:testing"
  - "type:refactor"
  - "type:performance"
  - "type:security"
  - "type:design"
  - "type:ci"
  - "type:discussion"

areas:
  - "area:csv-parser"
  - "area:cpp-core"
  - "area:python-api"
  - "area:pipeline"
  - "area:cleaning"
  - "area:pandas-interop"
  - "area:quality"
  - "area:schema"
  - "area:docs"
  - "area:website"
  - "area:ci-packaging"
  - "area:benchmarks"
  - "area:examples"
  - "area:developer-experience"
  - "area:release"

priorities:
  - "priority:critical"
  - "priority:high"
  - "priority:medium"
  - "priority:low"

levels:
  - "level:beginner"
  - "level:intermediate"
  - "level:advanced"
  - "level:critical"

quality:
  - "quality:clean"
  - "quality:exceptional"

gssoc:
  - "gssoc"
  - "gssoc:approved"
  - "gssoc:good-first-issue"

workflow:
  - "status:needs-triage"
  - "status:ready"
  - "status:claimed"
  - "status:blocked"
  - "status:needs-maintainer"

size:
  - "size:xs"
  - "size:s"
  - "size:m"
  - "size:l"