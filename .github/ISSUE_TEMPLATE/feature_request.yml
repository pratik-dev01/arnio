name: Feature request
description: Propose a new API, capability, integration, or user-facing improvement.
title: "Feature: "
labels: ["type:feature", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Arnio is focused on fast, reliable data preparation before pandas. Please connect your idea to a real workflow.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I frequently need to ... but currently Arnio doesn't support ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or API you'd like to see.
      placeholder: |
        A new pipeline step `remove_outliers` that accepts a column and a threshold:
        ```python
        ar.pipeline(frame, [
            ("remove_outliers", {"column": "price", "std_threshold": 3}),
        ])
        ```
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User story
      description: Who needs this, and when would they use it?
      placeholder: "As a data analyst cleaning vendor CSV files, I want ... so that ..."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would make this feature complete?
      placeholder: |
        - [ ] Public API is documented
        - [ ] Unit tests cover success and failure cases
        - [ ] Example added when useful
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches or workarounds?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area of Arnio does this affect?
      options:
        - New pipeline step (Python)
        - New pipeline step (C++)
        - CSV reader / I/O
        - Performance optimization
        - Data profiling / quality engine
        - Schema validation
        - pandas interoperability
        - API design
        - Documentation
        - CI / Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Expected difficulty
      description: If you are not sure, choose "Needs maintainer review".
      options:
        - Good first issue
        - Intermediate
        - Advanced
        - Needs maintainer review
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you like to implement this?
      options:
        - "Yes - I'd like to submit a PR"
        - "Maybe - I'd need guidance"
        - "No - just suggesting"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request fits Arnio's goal of reliable data preparation, profiling, validation, or pandas handoff.
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, examples, or references.
