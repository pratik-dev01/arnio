# CodeQL Security Scan
name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze (Python & C++)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Install C++ Build Dependencies
        if: ${{ matrix.language == 'c-cpp' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build python3-dev
          pip install pybind11

      - name: Configure CMake for CodeQL
        if: ${{ matrix.language == 'c-cpp' }}
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DARNIO_BUILD_CPP_TESTS=ON \
            -DCMAKE_PREFIX_PATH=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")

      - name: Build Native Code Core
        if: ${{ matrix.language == 'c-cpp' }}
        run: cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"