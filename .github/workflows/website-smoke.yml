name: Website Smoke

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/check_website.py"
      - ".github/workflows/website-smoke.yml"
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "scripts/check_website.py"
      - ".github/workflows/website-smoke.yml"

jobs:
  website-smoke:
    name: Static website smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check local links, fragments, and required assets
        run: python scripts/check_website.py
